<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>rerender fixture</title></head>
<body>
<!--
  Perception spike fixture: a CONTENT-PRESERVING re-render. Every mutation REBUILDS
  the subtree with brand-new DOM nodes (new object identity, new CDP backendNodeId)
  while the referenced content — role + accessible name — and a stable `data-oracle`
  ground-truth marker are PRESERVED. This is the React-reconciliation / SSR->hydrate
  case that cross-turn refs actually live on, NOT a same-URL reload.

  `data-oracle` is the experiment's ground truth ONLY (it tells the harness "this is
  logically the same element across turns"); the ID schemes under test never read it.

  Two element families:
   - DISTINCT names ("Task N" / "Field N"): fingerprint(role+name) is unique.
   - IDENTICAL names (5x "Delete"): fingerprint collides → needs a position tiebreaker.
-->
<main id="app"></main>
<script>
  const distinct = [1, 2, 3, 4, 5];
  const dup = ['a', 'b', 'c', 'd', 'e'];
  let order = [...distinct];
  let dupOrder = [...dup];
  let prepend = false;

  function build() {
    const app = document.getElementById('app');
    app.replaceChildren(); // drop old nodes — identity swap

    const tasks = document.createElement('section');
    tasks.setAttribute('aria-label', 'Tasks');
    if (prepend) {
      const row = document.createElement('div');
      const b = document.createElement('button');
      b.textContent = 'Task 0';
      b.setAttribute('data-oracle', 'task-0');
      row.appendChild(b);
      tasks.appendChild(row);
    }
    for (const n of order) {
      const row = document.createElement('div');
      const b = document.createElement('button');
      b.textContent = 'Task ' + n;
      b.setAttribute('data-oracle', 'task-' + n);
      const inp = document.createElement('input');
      inp.setAttribute('aria-label', 'Field ' + n);
      inp.setAttribute('data-oracle', 'field-' + n);
      row.appendChild(b);
      row.appendChild(inp);
      tasks.appendChild(row);
    }
    app.appendChild(tasks);

    const items = document.createElement('section');
    items.setAttribute('aria-label', 'Items');
    for (const k of dupOrder) {
      const b = document.createElement('button');
      b.textContent = 'Delete'; // identical name across all five — fingerprint collision
      b.setAttribute('data-oracle', 'del-' + k);
      items.appendChild(b);
    }
    app.appendChild(items);
  }

  // React state-tick / reconciliation: same content+order, new node identities.
  window.__rerender = () => { build(); };
  // SSR -> hydrate: identity swap of the same content (modelled by a rebuild).
  window.__hydrate = () => { build(); };
  // Reorder: same elements, new positions (reverse both families).
  window.__reorder = () => { order = [...distinct].reverse(); dupOrder = [...dup].reverse(); build(); };
  // Insert-above: a new item at the top; existing items keep content+oracle, shift down.
  window.__insert = () => { prepend = true; build(); };

  build();
  window.__ready = true;
</script>
</body>
</html>
