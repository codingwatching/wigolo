<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>web components fixture</title></head>
<body>
<!--
  Perception spike fixture: shadow-DOM piercing. The official Playwright MCP fails
  silently on web components, so the spike must measure whether CDP's composed
  accessibility tree surfaces interactive elements inside OPEN shadow roots, and
  what it does with CLOSED roots (the hard scope boundary).
-->
<button data-oracle="light-1">Light Button</button>

<open-widget></open-widget>
<closed-widget></closed-widget>

<!-- nested: an open root inside an open root -->
<outer-widget></outer-widget>

<script>
  customElements.define('open-widget', class extends HTMLElement {
    connectedCallback() {
      const r = this.attachShadow({ mode: 'open' });
      r.innerHTML =
        '<button data-oracle="open-1">Shadow Open Button</button>' +
        '<input aria-label="Shadow Open Input" data-oracle="open-2">';
    }
  });

  customElements.define('closed-widget', class extends HTMLElement {
    constructor() { super(); this._root = this.attachShadow({ mode: 'closed' }); }
    connectedCallback() {
      this._root.innerHTML = '<button data-oracle="closed-1">Shadow Closed Button</button>';
    }
  });

  customElements.define('inner-widget', class extends HTMLElement {
    connectedCallback() {
      const r = this.attachShadow({ mode: 'open' });
      r.innerHTML = '<button data-oracle="nested-1">Nested Shadow Button</button>';
    }
  });
  customElements.define('outer-widget', class extends HTMLElement {
    connectedCallback() {
      const r = this.attachShadow({ mode: 'open' });
      const inner = document.createElement('inner-widget');
      r.appendChild(inner);
    }
  });

  window.__ready = true;
</script>
</body>
</html>
