<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>heavy fixture</title></head>
<body>
<!--
  Perception spike fixture: token-size scaling on a heavy page (worst case). The
  spec's "~200-400 tokens" is a planning estimate for a TYPICAL view; heavy-page
  reality is what the 2F budget/spill absorbs, so this measures the upper end, not
  a regression threshold. ?n=<count> controls element count (default 300).
-->
<main id="app"></main>
<script>
  const n = Number(new URLSearchParams(location.search).get('n') || 300);
  const app = document.getElementById('app');
  const kinds = ['Open', 'Edit', 'Delete', 'Share', 'Archive'];
  for (let i = 0; i < n; i++) {
    const row = document.createElement('div');
    const b = document.createElement('button');
    b.textContent = kinds[i % kinds.length] + ' ' + i;
    const inp = document.createElement('input');
    inp.setAttribute('aria-label', 'Field ' + i);
    const a = document.createElement('a');
    a.href = '#row-' + i;
    a.textContent = 'Link ' + i;
    row.append(b, inp, a);
    app.appendChild(row);
  }
  window.__ready = true;
</script>
</body>
</html>
