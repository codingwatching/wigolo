name: CI

on:
  push:
    branches: [main, studio-handoff]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-unit:
    name: lint + build + unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Existing jobs never launch Electron; skip the ~100MB binary the workspaces
    # conversion would otherwise pull on every OS.
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Check no NUL bytes (grep-integrity)
        shell: bash
        run: npm run check:no-nul

      - name: Lint (tsc --noEmit)
        shell: bash
        run: npm run lint

      - name: Build
        shell: bash
        run: npm run build

      - name: Unit tests
        shell: bash
        run: npm run test:unit

  full-suite:
    name: full test suite (ubuntu)
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - run: npx playwright install --with-deps chromium

      - run: npm test

  # Studio unit tests are pure (no Electron binary launched) — run on all 3 OS
  # and skip the ~150MB electron binary download to avoid its install flakiness.
  studio-unit:
    name: studio unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      # The app imports the built core via the `wigolo/studio` exports subpath,
      # so core dist must exist before the app's tsc lint + unit tests resolve it.
      - name: Build core (for wigolo/studio types)
        shell: bash
        run: npm run build

      - name: Lint studio (tsc --noEmit)
        shell: bash
        run: npm run lint -w apps/studio

      - name: Unit tests (studio)
        shell: bash
        run: npm test -w apps/studio

  # Studio e2e launches the real app (Electron GUI) — run on Linux with a virtual
  # display. Cross-OS GUI-launch flakiness gives little signal before packaging;
  # macOS/Windows app-launch coverage returns with signing/notarization in P8.
  studio-e2e:
    name: studio e2e (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Full install (no skip env) — e2e needs the real electron binary.
      - name: Install dependencies
        shell: bash
        run: npm ci

      # npm ci's electron postinstall can extract partially / race the exec;
      # re-run the installer as a dedicated step so the binary is complete + settled
      # before Playwright launches it (fixes ETXTBSY / "failed to install correctly").
      - name: Ensure Electron binary is fully installed
        run: |
          node node_modules/electron/install.js
          node -p "require('electron')"

      - name: Install Linux GUI libs for Electron
        run: npx playwright install-deps

      # RUN_STUDIO_E2E enables the agent-line spec (real gateway: open/observe/act/list/close over the
      # bearer). The studio-only gateway is better-sqlite3-free, so NO electron-rebuild is needed here.
      - name: E2E (virtual display)
        run: xvfb-run -a npm run test:e2e -w apps/studio
        env:
          RUN_STUDIO_E2E: '1'
